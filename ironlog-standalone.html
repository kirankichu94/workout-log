/* ── streak helpers ── */
function calcStreak(logs){
  const dates=Object.keys(logs).sort().reverse();
  if(!dates.length)return{current:0,longest:0,thisWeek:0};
  const msDay=86400000;
  const today=TODAY();
  let current=0;
  let cursor=new Date(today+"T00:00:00");
  for(let i=0;i<365;i++){
    const d=cursor.toISOString().slice(0,10);
    if(dates.includes(d)){current++;cursor=new Date(cursor.getTime()-msDay);}
    else if(i===0){cursor=new Date(cursor.getTime()-msDay);}
    else break;
  }
  let longest=0,run=0,prev=null;
  dates.slice().reverse().forEach(d=>{
    if(prev&&(new Date(d+"T00:00:00")-new Date(prev+"T00:00:00"))===msDay)run++;
    else run=1;
    if(run>longest)longest=run;
    prev=d;
  });
  const now=new Date(today+"T00:00:00");
  const dow=now.getDay()||7;
  const mon=new Date(now.getTime()-(dow-1)*msDay);
  const thisWeek=dates.filter(d=>{const dt=new Date(d+"T00:00:00");return dt>=mon&&dt<=now;}).length;
  return{current,longest,thisWeek};
}

function getWeeklyVolume(logs){
  const msDay=86400000;
  const today=new Date(TODAY()+"T00:00:00");
  const dow=today.getDay()||7;
  const thisMon=new Date(today.getTime()-(dow-1)*msDay);
  return Array.from({length:6},(_,i)=>{
    const mon=new Date(thisMon.getTime()-i*7*msDay);
    const sun=new Date(mon.getTime()+6*msDay);
    const label=`${mon.getDate()}/${mon.getMonth()+1}`;
    let tonnage=0,sessions=0,sets=0;
    const muscleMap={};
    Object.entries(logs).forEach(([d,log])=>{
      const dt=new Date(d+"T00:00:00");
      if(dt>=mon&&dt<=sun){
        sessions++;
        (log.rows||[]).forEach(row=>{
          (row.sets||[]).forEach(s=>{const kg=parseFloat(s.kg)||0,reps=parseFloat(s.reps)||0;if(kg&&reps){tonnage+=kg*reps;sets++;}});
          const n=(row.name||"").toLowerCase();
          const grp=n.includes("bench")||n.includes("chest")||n.includes("fly")||n.includes("dip")?"Chest":n.includes("pull")||n.includes("row")||n.includes("deadlift")||n.includes("lat")?"Back":n.includes("squat")||n.includes("leg")||n.includes("lunge")||n.includes("calf")?"Legs":n.includes("curl")&&!n.includes("wrist")?"Biceps":n.includes("tricep")||n.includes("pushdown")||n.includes("extension")?"Triceps":n.includes("shoulder")||n.includes("lateral")||n.includes("press")||n.includes("delt")||n.includes("face pull")?"Shoulders":"Other";
          muscleMap[grp]=(muscleMap[grp]||0)+(row.sets||[]).filter(s=>s.kg).length;
        });
      }
    });
    return{label,tonnage:Math.round(tonnage),sessions,sets,muscleMap};
  }).reverse();
}

      if(data.draft)setDraft(data.draft);

    }

  useEffect(()=>{
    if(!loaded)return;
    clearTimeout(saveTimer.current);

  },[plans,wLogs,cLogs,draft,loaded]);

  const show=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};
  const goHome=()=>{setPage("home");setSelId(null);};
  const selPlan=plans.find(p=>p.id===selId)||null;

  function getPrevLog(planId){
    const todayLog=(wLogs[td]&&wLogs[td].planId===planId)?wLogs[td]:null;
    const pastEntries=Object.entries(wLogs).filter(([d,l])=>d!==td&&l.planId===planId).sort(([a],[b])=>a.localeCompare(b));

    return{todayLog,pastLog};
  }

  if(!loaded)return(<div style={{minHeight:"100vh",background:"#09090e",color:"#555",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>Loading IronLog… 🔥</div>);

      {page==="home"&&<>
        {tab==="workout"&&<WorkoutHome plans={plans} logs={wLogs} cLogs={cLogs} today={td}
          onLog={id=>{setSelId(id);setPage("log");}}
          onEdit={id=>{setSelId(id);setPage("edit");}}
          onHistory={()=>setPage("history")}
          onProgress={()=>setPage("progress")}
          onDashboard={()=>setPage("dashboard")}
          onAdd={p=>setPlans(ps=>[...ps,p])}
          onDel={id=>{setPlans(ps=>ps.filter(p=>p.id!==id));show("Deleted");}}
          show={show}/>}
        {tab==="calories"&&<CalHome cLogs={cLogs} today={td}

/* ══ LOG PAGE ══ */
function LogPage({plan,todayLog,pastLog,draftData,onDraftChange,allLogs,onBack,onSave,onPR,show}){
  const td=TODAY();
  function mkRows(){
    if(draftData&&draftData.length>0)return draftData.map(r=>({...r,sets:(r.sets||[]).map(s=>({...s,id:s.id||uid()}))}));
    if(todayLog&&todayLog.rows&&todayLog.rows.length>0)return todayLog.rows.map(r=>({...r,sets:(r.sets||[]).map(s=>({...s,id:s.id||uid()}))}));
    return(plan.exercises||[]).map(ex=>{const n=parseInt((ex.target||"3×10").match(/\d+/)||["3"])||3;return{exId:ex.id,name:ex.name,target:ex.target,sets:Array.from({length:n},()=>({id:uid(),kg:"",reps:""}))};});
  }
  const [rows,setRows]=useState(mkRows);
  const [addSheet,setAddSheet]=useState(false);
  const [nEx,setNEx]=useState("");const [nTgt,setNTgt]=useState("");
  const draftTimer=useRef(null);
  useEffect(()=>{clearTimeout(draftTimer.current);draftTimer.current=setTimeout(()=>onDraftChange(rows),400);return()=>clearTimeout(draftTimer.current);},[rows]);

  function getBest(exId){
    if(!pastLog)return null;
    const row=(pastLog.rows||[]).find(r=>r.exId===exId);if(!row)return null;
    const best=(row.sets||[]).reduce((x,s)=>(parseFloat(s.kg)||0)>(parseFloat(x.kg)||0)?s:x,{kg:0,reps:0});
    return parseFloat(best.kg)>0?best:null;
  }
  function updSet(ri,si,field,val){setRows(prev=>prev.map((r,i)=>i!==ri?r:{...r,sets:r.sets.map((s,j)=>j!==si?s:{...s,[field]:val})}));}
  function checkPR(ri,field,val){
    if(field!=="kg")return;
    const row=rows[ri];const best=getBest(row.exId);if(!best)return;
    const newKg=parseFloat(val)||0;
    if(newKg>parseFloat(best.kg||0)){const reps=rows[ri].sets[0]?rows[ri].sets[0].reps:"";onPR({name:row.name,kg:newKg,reps:reps||"?"});}
  }
  function addSet(ri){setRows(prev=>prev.map((r,i)=>i!==ri?r:{...r,sets:[...r.sets,{id:uid(),kg:"",reps:""}]}));}
  function delSet(ri,si){setRows(prev=>prev.map((r,i)=>i!==ri?r:{...r,sets:r.sets.filter((_,j)=>j!==si)}));}
  function delEx(ri){setRows(prev=>prev.filter((_,i)=>i!==ri));}
  function addEx(){if(!nEx.trim())return;const n=parseInt((nTgt||"3×10").match(/\d+/)||["3"])||3;setRows(prev=>[...prev,{exId:uid(),name:nEx.trim(),target:nTgt.trim()||"3×10",sets:Array.from({length:n},()=>({id:uid(),kg:"",reps:""}))}]);setNEx("");setNTgt("");setAddSheet(false);show("Exercise added ✓");}
  function calcKcal(){let t=0;rows.forEach(r=>r.sets.forEach(s=>{const kg=parseFloat(s.kg)||0,rp=parseFloat(s.reps)||0;if(kg&&rp)t+=(kg*rp*0.00035*75/10)+5;}));return Math.round(t);}
  const done=rows.filter(r=>r.sets.some(s=>s.kg)).length;

  return(<div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
    <div style={{padding:"50px 16px 14px",borderBottom:"1px solid #1a1a2a",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
      <BackBtn onClick={onBack}/>
      <div style={{flex:1}}><div style={{fontSize:11,color:"#666"}}>{fmtD(td)}</div><div style={{fontSize:18,fontWeight:900,lineHeight:1.2}}>{plan.name}</div></div>
      <div style={{background:"#131320",borderRadius:20,padding:"6px 14px",fontSize:15,fontWeight:700}}><span style={{color:plan.color}}>{done}</span><span style={{color:"#555"}}>/{rows.length}</span></div>
    </div>
    {pastLog&&<div style={{background:"#0a0a1a",padding:"8px 16px",fontSize:12,color:"#888",borderBottom:"1px solid #1a1a2a"}}>🔵 Ref: {fmtD(pastLog.date||"")}</div>}
    {draftData&&draftData.length>0&&<div style={{background:"#1a1200",padding:"8px 16px",fontSize:12,color:"#F4D35E",borderBottom:"1px solid #2a2200"}}>✏️ Resumed from where you left off</div>}
    {!draftData&&todayLog&&<div style={{background:"#0a1a0a",padding:"8px 16px",fontSize:12,color:"#4ECDC4",borderBottom:"1px solid #1a2a1a"}}>✅ Continuing today's saved session</div>}

    <div style={{flex:1,overflowY:"auto",paddingBottom:100}}>
      {rows.map((row,ri)=>{
        const best=getBest(row.exId);
        const rowBest=Math.max(...row.sets.map(s=>parseFloat(s.kg)||0));
        const isPR=best&&rowBest>parseFloat(best.kg||0);
        return(<div key={row.exId+ri} style={{background:"#0e0e16",borderRadius:14,margin:"10px 12px",border:"1px solid #1a1a2a",overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:10,padding:"12px 14px 8px"}}>
            <div style={{flex:1}}><div style={{fontWeight:800,fontSize:15}}>{row.name}</div><div style={{fontSize:11,color:"#666",marginTop:2}}>Target: {row.target}</div></div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
              {best?(<div style={{background:"#111",borderRadius:10,padding:"6px 10px",textAlign:"right"}}>
                {isPR&&<div style={{fontSize:9,color:"#1A936F",fontWeight:900}}>▲ PR</div>}
                <div style={{fontSize:14,fontWeight:900,color:plan.color}}>{best.kg}<span style={{fontSize:10,color:"#666"}}>kg</span></div>
                <div style={{fontSize:11,color:"#777"}}>×{best.reps} last</div>
              </div>):<div style={{background:"#111",borderRadius:8,padding:"4px 10px",fontSize:11,color:"#444"}}>No prev</div>}
              <button onClick={()=>{if(window.confirm(`Remove "${row.name}"?`))delEx(ri);}} style={{padding:"4px 10px",borderRadius:20,background:"transparent",border:"1px solid #2a1a1a",color:"#C3423F",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✕ Remove</button>
            </div>
          </div>
          <div style={{padding:"0 10px 10px"}}>
            <div style={{display:"flex",padding:"3px 4px 6px",fontSize:10,letterSpacing:1,color:"#555"}}>
              <div style={{width:28}}>SET</div><div style={{flex:1,textAlign:"center"}}>PREV</div>
              <div style={{flex:1,textAlign:"center",color:plan.color}}>KG</div>
              <div style={{flex:1,textAlign:"center",color:plan.color}}>REPS</div>
              <div style={{width:20}}/>
            </div>
            {row.sets.map((s,si)=>{
              const done=s.kg&&s.reps;
              return(<div key={s.id} style={{display:"flex",alignItems:"center",gap:4,padding:4,borderRadius:8,marginBottom:3,background:done?"#0d1a10":"#0c0c14"}}>
                <div style={{width:28,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,background:done?plan.color+"33":"#111",color:done?plan.color:"#555",flexShrink:0}}>{si+1}</div>
                <div style={{flex:1,textAlign:"center",fontSize:12,color:"#555"}}>{best?`${best.kg}×${best.reps}`:"—"}</div>
                <div style={{flex:1}}><input type="number" inputMode="decimal" value={s.kg} onChange={e=>{updSet(ri,si,"kg",e.target.value);checkPR(ri,"kg",e.target.value);}} placeholder={best?best.kg:"kg"} style={{width:"100%",padding:"7px 2px",background:"#09090e",border:`2px solid ${s.kg?plan.color:"#1a1a2a"}`,borderRadius:8,color:"#f0f0f0",fontSize:15,fontWeight:800,textAlign:"center",outline:"none",fontFamily:"inherit"}}/></div>
                <div style={{flex:1}}><input type="number" inputMode="numeric" value={s.reps} onChange={e=>updSet(ri,si,"reps",e.target.value)} placeholder={best?best.reps:"reps"} style={{width:"100%",padding:"7px 2px",background:"#09090e",border:`2px solid ${s.reps?plan.color:"#1a1a2a"}`,borderRadius:8,color:"#f0f0f0",fontSize:15,fontWeight:800,textAlign:"center",outline:"none",fontFamily:"inherit"}}/></div>
                <button onClick={()=>delSet(ri,si)} style={{width:20,background:"transparent",border:"none",color:"#333",cursor:"pointer",fontSize:18,padding:0,flexShrink:0}}>×</button>
              </div>);
            })}
            <button onClick={()=>addSet(ri)} style={{width:"100%",padding:"7px",borderRadius:8,background:"transparent",border:"1px dashed #1e1e2e",color:"#555",fontSize:12,fontWeight:700,cursor:"pointer",marginTop:4,fontFamily:"inherit"}}>+ Add Set</button>
          </div>
        </div>);
      })}
      <div style={{margin:"4px 12px 10px",border:"1px dashed #1e1e2e",borderRadius:14}}>
        <button onClick={()=>setAddSheet(true)} style={{width:"100%",padding:14,background:"transparent",border:"none",color:plan.color,fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <span style={{fontSize:20}}>＋</span> Add Exercise
        </button>
      </div>
    </div>

    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,padding:"12px 16px 28px",background:"linear-gradient(transparent,#09090e 35%)"}}>
      <BigBtn color={plan.color} onClick={()=>onSave({planId:plan.id,planName:plan.name,date:td,calories:calcKcal(),rows})}>Save Workout →</BigBtn>
    </div>

    {addSheet&&<Sheet title="Add Exercise" onClose={()=>{setAddSheet(false);setNEx("");setNTgt("");}}>
      <Lbl>EXERCISE NAME</Lbl><TInput autoFocus value={nEx} onChange={e=>setNEx(e.target.value)} placeholder="e.g. Cable Fly…"/>
      <Lbl>SETS × REPS</Lbl><TInput value={nTgt} onChange={e=>setNTgt(e.target.value)} placeholder="e.g. 3×12–15"/>
      <BigBtn color={plan.color} onClick={addEx}>+ Add to Session</BigBtn>
    </Sheet>}
  </div>);
}

/* ══ DASHBOARD ══ */
function DashboardPage({logs,plans,onBack}){
  const streak=calcStreak(logs);
  const weeks=getWeeklyVolume(logs);
  const thisWeek=weeks[weeks.length-1];
  const lastWeek=weeks[weeks.length-2];
  const maxTon=Math.max(...weeks.map(w=>w.tonnage),1);
  const tonnageDelta=lastWeek&&lastWeek.tonnage>0?Math.round(((thisWeek.tonnage-lastWeek.tonnage)/lastWeek.tonnage)*100):null;
  const allMuscles={};
  Object.entries(thisWeek.muscleMap||{}).forEach(([k,v])=>{allMuscles[k]=v;});
  if(Object.keys(allMuscles).length===0&&lastWeek)Object.entries(lastWeek.muscleMap||{}).forEach(([k,v])=>{allMuscles[k]=v;});

    <div style={{padding:"50px 16px 14px",borderBottom:"1px solid #1a1a2a",display:"flex",alignItems:"center",gap:12}}>
      <BackBtn onClick={onBack}/><div style={{fontSize:20,fontWeight:900}}>Dashboard 📊</div>
    </div>
    <div style={{padding:"14px 16px",paddingBottom:40}}>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[["🔥",streak.current,"Day Streak","#FF6B35"],["📅",streak.thisWeek,"This Week","#4ECDC4"],["🏅",streak.longest,"Best Streak","#F4D35E"]].map(([ic,v,lb,c])=>(
          <div key={lb} style={{flex:1,background:"#0e0e16",border:"1px solid #1a1a2a",borderRadius:16,padding:"14px 8px",textAlign:"center"}}>
            <div style={{fontSize:22}}>{ic}</div><div style={{fontSize:28,fontWeight:900,color:c,lineHeight:1.1,marginTop:4}}>{v}</div><div style={{fontSize:10,color:"#666",marginTop:4}}>{lb}</div>

        </div>
        <div style={{height:10,background:"#1a1a2a",borderRadius:5,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${Math.min(100,(streak.thisWeek/6)*100)}%`,background:streak.thisWeek>=6?"#1A936F":"#FF6B35",borderRadius:5}}/>
        </div>
        <div style={{fontSize:11,color:"#555",marginTop:6}}>{6-streak.thisWeek>0?`${6-streak.thisWeek} more session${6-streak.thisWeek>1?"s":""} to hit your goal`:"🎯 Weekly goal crushed!"}</div>
      </div>
      <div style={{background:"#0e0e16",border:"1px solid #1a1a2a",borderRadius:16,padding:"14px 16px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{fontWeight:800,fontSize:14}}>Weekly Tonnage (kg)</span>
          {tonnageDelta!==null&&<span style={{fontSize:12,fontWeight:800,color:tonnageDelta>=0?"#1A936F":"#C3423F"}}>{tonnageDelta>=0?"▲":"▼"} {Math.abs(tonnageDelta)}% vs last wk</span>}
        </div>
        {weeks.some(w=>w.tonnage>0)?(<svg viewBox="0 0 340 120" style={{width:"100%",height:"auto"}}>
          {weeks.map((w,i)=>{const barW=36,gap=(340-weeks.length*barW)/(weeks.length+1),x=gap+i*(barW+gap),h=Math.max(maxTon>0?(w.tonnage/maxTon)*80:0,w.tonnage>0?4:0),y=90-h,isThis=i===weeks.length-1;return(<g key={i}>

            <text x={x+barW/2} y={108} fill={isThis?"#FF6B35":"#555"} fontSize={8} textAnchor="middle">{w.label}</text>
            {w.sessions>0&&<text x={x+barW/2} y={118} fill="#555" fontSize={7} textAnchor="middle">{w.sessions}d</text>}
          </g>);})}
        </svg>):<div style={{textAlign:"center",padding:"24px 0",color:"#555",fontSize:13}}>Log workouts to see volume trends</div>}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>

          </div>
        ))}
      </div>}
    </div>
  </div>);
}

/* ══ CAL HOME ══ */
function CalHome({cLogs,today,onAddFood,onRemove,onGoal}){
  const data=cLogs[today]||{goal:2200,entries:[]};
  const entries=data.entries||[];const goal=data.goal||2200;
  const [editGoal,setEditGoal]=useState(false);const [gi,setGi]=useState(String(goal));
  const T=entries.reduce((a,e)=>({cal:a.cal+(e.cal||0),protein:a.protein+(e.protein||0),carbs:a.carbs+(e.carbs||0),fat:a.fat+(e.fat||0)}),{cal:0,protein:0,carbs:0,fat:0});
  const pct=Math.min(100,(T.cal/goal)*100);const rem=goal-Math.round(T.cal);
  const grouped=MEALS.reduce((a,m)=>({...a,[m]:entries.filter(e=>e.meal===m)}),{});
  return(<div>
    <div style={{padding:"50px 18px 14px",borderBottom:"1px solid #1a1a2a",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>

      <Chip onClick={()=>{setGi(String(goal));setEditGoal(true);}}>⚙️ Goal</Chip>
    </div>
    <div style={{padding:"14px 16px"}}>
      <div style={{display:"flex",gap:14,alignItems:"center",background:"#0e0e16",borderRadius:16,padding:16,marginBottom:14,border:"1px solid #1a1a2a"}}>
        <Ring pct={pct} cal={Math.round(T.cal)} goal={goal} rem={rem}/>
        <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
          {[["Protein",Math.round(T.protein),160,"#FF6B35","g"],["Carbs",Math.round(T.carbs),300,"#4ECDC4","g"],["Fat",Math.round(T.fat),80,"#F4D35E","g"]].map(([l,v,mx,c,u])=>(
            <div key={l}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:11,color:"#888"}}>{l}</span><span style={{fontSize:12,fontWeight:800,color:c}}>{v}{u}</span></div>
            <div style={{height:5,background:"#1a1a2a",borderRadius:3}}><div style={{height:"100%",width:`${Math.min(100,(v/mx)*100)}%`,background:c,borderRadius:3}}/></div></div>
          ))}
        </div>
      </div>
      <BigBtn color="#FF6B35" onClick={onAddFood} style={{marginBottom:14}}>+ Log Food / Meal</BigBtn>
      {entries.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:"#555"}}><div style={{fontSize:36}}>🍽️</div><div style={{marginTop:8}}>No food logged today</div></div>}
      {MEALS.map(m=>{const items=grouped[m]||[];if(!items.length)return null;return(
        <div key={m} style={{background:"#0e0e16",borderRadius:14,marginBottom:10,border:"1px solid #1a1a2a",overflow:"hidden"}}>
          <div style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",borderBottom:"1px solid #131320"}}>
            <span style={{fontWeight:800,fontSize:14}}>{m}</span><span style={{color:"#FF6B35",fontWeight:700,fontSize:13}}>{Math.round(items.reduce((a,e)=>a+(e.cal||0),0))} kcal</span>
          </div>
          {items.map(e=>(<div key={e.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:"1px solid #0d0d14"}}>
            <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{e.name}</div><div style={{fontSize:11,color:"#666",marginTop:2}}>{e.qty} {e.unit} · P:{Math.round(e.protein)}g C:{Math.round(e.carbs)}g F:{Math.round(e.fat)}g</div></div>
            <div style={{fontWeight:900,color:"#FF6B35",fontSize:15,flexShrink:0}}>{Math.round(e.cal)}<span style={{fontSize:10,color:"#666"}}>kcal</span></div>
            <button onClick={()=>onRemove(e.id)} style={{background:"transparent",border:"none",color:"#C3423F",cursor:"pointer",fontSize:20,padding:"0 4px",lineHeight:1}}>×</button>
          </div>))}
        </div>
      );})}
    </div>
    {editGoal&&<Sheet title="Daily Calorie Goal" onClose={()=>setEditGoal(false)}>
      <Lbl>TARGET KCAL</Lbl><TInput type="number" inputMode="numeric" autoFocus value={gi} onChange={e=>setGi(e.target.value)}/>
      <BigBtn color="#FF6B35" onClick={()=>{onGoal(parseInt(gi)||2200);setEditGoal(false);}}>Save</BigBtn>
    </Sheet>}
  </div>);
}

function Ring({pct,cal,goal,rem}){
  const r=44,circ=2*Math.PI*r,dash=(circ*pct)/100,over=pct>=100;
  return(<div style={{position:"relative",width:110,height:110,flexShrink:0}}>
    <svg viewBox="0 0 110 110" width={110} height={110}>
      <circle cx={55} cy={55} r={r} fill="none" stroke="#1a1a2a" strokeWidth={10}/>
      <circle cx={55} cy={55} r={r} fill="none" stroke={over?"#C3423F":"#FF6B35"} strokeWidth={10} strokeDasharray={`${dash} ${circ}`} strokeDashoffset={circ*0.25} strokeLinecap="round"/>
    </svg>
    <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontSize:20,fontWeight:900,color:over?"#C3423F":"#FF6B35",lineHeight:1}}>{cal}</div>
      <div style={{fontSize:9,color:"#666"}}>/ {goal}</div>
      <div style={{fontSize:10,fontWeight:700,color:rem>=0?"#4ECDC4":"#C3423F",marginTop:1}}>{rem>=0?`${rem} left`:`${Math.abs(rem)} over`}</div>
    </div>
  </div>);
}

/* ══ PROGRESS ══ */
function ProgressPage({logs,plans,onBack}){
  const allEx=[];plans.forEach(p=>p.exercises.forEach(ex=>{if(!allEx.find(e=>e.id===ex.id))allEx.push(ex);}));
  const [selEx,setSelEx]=useState(allEx.length>0?allEx[0].id:null);
  const chartData=Object.keys(logs).sort().map(d=>{const row=(logs[d].rows||[]).find(r=>r.exId===selEx);if(!row)return null;const best=Math.max(...(row.sets||[]).map(s=>parseFloat(s.kg)||0));return best>0?{date:d.slice(5),kg:best}:null;}).filter(Boolean);
  const PRs=allEx.map(ex=>{let best={kg:0,reps:0,date:null};Object.entries(logs).forEach(([d,log])=>{(log.rows||[]).forEach(row=>{if(row.exId!==ex.id)return;(row.sets||[]).forEach(s=>{if((parseFloat(s.kg)||0)>best.kg)best={kg:parseFloat(s.kg),reps:s.reps,date:d};});});});return best.kg>0?{...ex,...best}:null;}).filter(Boolean);
  const W=340,H=150,PAD=36;
  const maxKg=chartData.length>0?Math.max(...chartData.map(d=>d.kg)):100;
  const minKg=chartData.length>0?Math.min(...chartData.map(d=>d.kg)):0;
  const xs=i=>PAD+(chartData.length>1?(i/(chartData.length-1)):0.5)*(W-PAD*2);
  const ys=v=>H-16-((v-minKg)/Math.max(maxKg-minKg,1))*(H-36);
  return(<div style={{minHeight:"100vh"}}>
    <div style={{padding:"50px 16px 14px",borderBottom:"1px solid #1a1a2a",display:"flex",alignItems:"center",gap:12}}>
      <BackBtn onClick={onBack}/><div style={{fontSize:20,fontWeight:900}}>Progress 📈</div>
    </div>
    <div style={{padding:"14px 16px",paddingBottom:40}}>
      <div style={{background:"#0e0e16",borderRadius:16,padding:16,marginBottom:16,border:"1px solid #1a1a2a"}}>
        <div style={{fontSize:10,letterSpacing:2,color:"#555",fontWeight:700,marginBottom:10}}>STRENGTH CHART</div>
        <select value={selEx||""} onChange={e=>setSelEx(e.target.value)} style={{width:"100%",padding:10,background:"#0d0d18",border:"1px solid #1a1a2a",borderRadius:10,color:"#f0f0f0",fontSize:14,marginBottom:12,outline:"none",fontFamily:"inherit"}}>
          {allEx.map(ex=><option key={ex.id} value={ex.id}>{ex.name}</option>)}
        </select>
        {chartData.length>=2?(<svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto"}}>
          {[0,0.5,1].map((t,i)=>{const v=minKg+t*(maxKg-minKg),y=ys(v);return<g key={i}><line x1={PAD} y1={y} x2={W-PAD} y2={y} stroke="#1a1a2a" strokeWidth={1}/><text x={PAD-4} y={y+4} fill="#555" fontSize={9} textAnchor="end">{Math.round(v)}</text></g>;})}
          {chartData.map((d,i)=><text key={i} x={xs(i)} y={H-2} fill="#555" fontSize={8} textAnchor="middle">{d.date}</text>)}
          <polyline fill="none" stroke="#FF6B35" strokeWidth={2.5} strokeLinejoin="round" points={chartData.map((d,i)=>`${xs(i)},${ys(d.kg)}`).join(" ")}/>
          {chartData.map((d,i)=><circle key={i} cx={xs(i)} cy={ys(d.kg)} r={4} fill="#FF6B35"/>)}
        </svg>):<div style={{textAlign:"center",padding:"24px 0",color:"#555",fontSize:13}}>Log 2+ sessions to see trend</div>}
      </div>
      <div style={{fontSize:10,letterSpacing:2,color:"#555",fontWeight:700,marginBottom:10}}>PERSONAL RECORDS</div>
      {PRs.length===0&&<div style={{color:"#555",fontSize:14,textAlign:"center",padding:"20px 0"}}>No PRs yet. Start lifting! 💪</div>}
      {PRs.map(pr=>(<div key={pr.id} style={{display:"flex",alignItems:"center",gap:12,background:"#0e0e16",borderRadius:12,padding:"12px 14px",marginBottom:8,border:"1px solid #1a1a2a"}}>
        <div style={{flex:1,fontSize:14,fontWeight:600}}>{pr.name}</div>
        <div style={{textAlign:"right"}}><span style={{fontSize:18,fontWeight:900,color:"#FF6B35"}}>{pr.kg}</span><span style={{fontSize:11,color:"#888"}}> kg×{pr.reps}</span><div style={{fontSize:10,color:"#555"}}>{fmtD(pr.date)}</div></div>
      </div>))}
    </div>
  </div>);
}

/* ══ SHARED UI ══ */
function BackBtn({onClick}){return<button onClick={onClick} style={{width:36,height:36,borderRadius:10,background:"#1a1a2a",border:"none",color:"#aaa",cursor:"pointer",fontSize:22,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"inherit"}}>‹</button>;}
function Chip({onClick,children}){return<button onClick={onClick} style={{padding:"7px 12px",borderRadius:20,background:"#131320",border:"1px solid #1a1a2a",color:"#aaa",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{children}</button>;}
function BigBtn({color,onClick,children,disabled,style}){return<button onClick={onClick} disabled={disabled} style={{padding:"13px 20px",borderRadius:100,border:"none",background:color,color:"#000",fontWeight:800,fontSize:15,cursor:"pointer",width:"100%",fontFamily:"inherit",opacity:disabled?0.5:1,...style}}>{children}</button>;}
function Lbl({children}){return<div style={{fontSize:10,letterSpacing:2,color:"#666",fontWeight:700,marginBottom:6}}>{children}</div>;}
function TInput({style,...p}){return<input style={{display:"block",width:"100%",padding:"12px 14px",background:"#0d0d18",border:"1px solid #1a1a2a",borderRadius:12,color:"#f0f0f0",fontSize:16,outline:"none",fontFamily:"inherit",boxSizing:"border-box",marginBottom:12,...style}} {...p}/>;}
function Sheet({title,onClose,children}){return(
  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:60,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
    <div style={{width:"100%",maxWidth:430,background:"#14141e",borderRadius:"20px 20px 0 0",padding:"24px 20px 48px"}} onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:18,fontWeight:900,marginBottom:20}}>{title}</div>{children}
    </div>
  </div>);}
function actBtn(c,top){return{display:"flex",alignItems:"center",justifyContent:"center",padding:"0 14px",background:"transparent",border:"none",borderBottom:top?"1px solid #1a1a2a":"none",color:c,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",minHeight:44,minWidth:68};}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
